# =============================================================================
#  AugerNet — CEBE GNN Predict Config
# =============================================================================
#
#  Run predictions on a directory of .xyz files using a saved model
#  Builds molecular graphs on the fly
#
#  Run with:
#    python -m augernet --config /path/to/this/file/
#
#  Results written to cwd/predict_results/
#
#  Current AugerNet models only trained on Carbon 1s BEs and AES, predict will
#  make predictions on all atoms in the mol, so non carbon values currently not
#  meaningful.
# =============================================================================

model: cebe-gnn
mode: predict

# ── Path to the saved model (.pth) ──────────────────────────────────────────
# Relative to the working directory, or absolute.
#model_path: /path/to/saved/model/
model_path: /Users/foudaae/AugerNet/artifacts/model_weights/cebe_035_random_EQ3_h64_fold1.pth

# ── Directory of .xyz files to predict on ────────────────────────────────────
# Each file should be named <molecule_name>.xyz in standard XYZ format.
# NOTE: The model is trained on carbon 1s CEBEs only. Predictions for
#       non-carbon atoms (H, N, O, F) are not meaningful.
#predict_dir: /path/to/xyz/files/ 
predict_dir:  /Users/foudaae/AugerNet/data/raw/exp_cebe

# ── Must match the architecture / features used during training ──────────────
# Node Feature Specification
#   Atom types: 0=skipatom_200, 1=skipatom_30, 2=onehot, 
#   Other:      3=atomic_be,    4=mol_be (DO NOT USE for CEBE), 
#               5=e_score,      6=env_onehot
feature_keys: '035'                # skipatom_200 + atomic_be + e_score

layer_type: EQ
hidden_channels: 64
n_layers: 3

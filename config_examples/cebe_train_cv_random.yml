# =============================================================================
#  AugerNet — CEBE GNN Default Configuration
# =============================================================================
#
#  Run with:
#    python -m augernet --model cebe-gnn --mode train --config configs/cebe_default.yml
#
#  Any field can be overridden on the command line:
#    python -m augernet --config configs/cebe_default.yml --train_fold 2 --mode cv
#
# =============================================================================

# ── Identity ─────────────────────────────────────────────────────────────────
model: cebe-gnn
mode: cv

# ── Run flags ────────────────────────────────────────────────────────────────
run_evaluation: true
run_unit_tests: true

# ── K-fold ───────────────────────────────────────────────────────────────────
n_folds: 5
train_fold: 3
split_method: random

# ── Features ─────────────────────────────────────────────────────────────────
#   0=skipatom_200, 1=skipatom_30, 2=onehot, 3=atomic_be,
#   4=mol_be (DO NOT USE for CEBE), 5=e_score, 6=env_onehot
feature_keys: [0, 3, 5]           # skipatom_200 + atomic_be + e_score
feature_scale: MEANSTD             # MEANSTD | NORM | NONE

# ── Model hyper-parameters ───────────────────────────────────────────────────
layer_type: EQ                     # EQ (equivariant) | IN (invariant)
hidden_channels: 64
n_layers: 3
num_epochs: 500
patience: 30
batch_size: 24
learning_rate: 0.001
random_seed: 42

# ── Output scaling ───────────────────────────────────────────────────────────
out_scale: MEANSTD                 # NONE | FEATURE_SCALE | MEANSTD
pred_type: CEBE

# ── Optimizer ────────────────────────────────────────────────────────────────
optimizer_type: adamw
weight_decay: 5.0e-4
gradient_clip_norm: 0.5
warmup_epochs: 10
min_lr: 1.0e-7

# ── Hyperparameter search grid ──────────────────────────────────────────────
param_grid:
  learning_rate: [0.0001, 0.0003, 0.001]
  weight_decay:  [1.0e-4, 5.0e-4, 1.0e-3]
  n_layers:      [4, 5, 6]
  hidden_channels: [48, 64]
  batch_size:    [24, 32, 48]

# =============================================================================
#  AugerNet — CEBE GNN Predict Config
# =============================================================================
#
#  Run predictions on a directory of .xyz files using a saved model.
#  Builds molecular graphs on the fly — no pre-processing needed.
#  Results are written to predict_results/ in the working directory.
#
#  Run with:
#    python -m augernet --config config_examples/cebe_predict.yml
#
# =============================================================================

model: cebe-gnn
mode: predict

# ── Path to the saved model (.pth) ──────────────────────────────────────────
# Relative to the working directory, or absolute.
model_path: param_results/models/cebe_035_random_EQ3_h64_fold1_cfg002.pth

# ── Directory of .xyz files to predict on ────────────────────────────────────
# Each file should be named "molecule_name.xyz" in standard XYZ format.
# NOTE: The model is trained on carbon 1s CEBEs only. Predictions for
#       non-carbon atoms (H, N, O, F) are not meaningful.
predict_dir: /Users/foudaae/AugerNet/data/raw/exp_cebe #raw exp data as example

# ── Must match the architecture / features used during training ──────────────
feature_keys: '035'
feature_scale: MEANSTD
out_scale: MEANSTD

layer_type: EQ
hidden_channels: 64
n_layers: 3

# AugerNet Data Manifest
# ======================
#
# This file records the Zenodo dataset associated with this release,
# including the DOI, per-file download URLs, file sizes, and SHA-256
# checksums for each data file.
#
# To download all data files automatically, use the `url` field for each file.
#
# To verify data integrity after downloading, run from the repo root:
#
#   shasum -a 256 data/processed/*.pt data/raw/*.tar.gz
#
# and compare the output against the sha256 checksums listed below.

zenodo:
  doi: "10.5281/zenodo.XXXXXXX"       # TODO: replace with actual DOI after upload
  record_id: "XXXXXXX"                 # TODO: numeric suffix of the DOI
  url: "https://doi.org/10.5281/zenodo.XXXXXXX"
  version: "1.0.0"
  title: "AugerNet: CEBE Training Data"
  license: "CC-BY-4.0"
  description: >
    Calculated and experimental carbon 1s core-electron binding energy (CEBE)
    datasets used to train and evaluate the AugerNet GNN models.

files:
  # Pre-processed PyG datasets (data/processed/)
  - path: data/processed/cebe_norm_stats.pt
    description: "Normalization statistics (mean, std) computed from calc_cebe"
    size_bytes: 1088
    sha256: f918e91189272890cd4a36015e96df3b873ddc334c6e98e8deb104003a89dce7
    url: "https://zenodo.org/records/XXXXXXX/files/cebe_norm_stats.pt?download=1"

  - path: data/processed/gnn_calc_cebe_data.pt
    description: "Calculated CEBE molecular graphs (primary training set)"
    size_bytes: 54949546
    sha256: b4fbe91d68b92dabe207477868d0454a3a021fe687f34baa6e3fd272f9c8af91
    url: "https://zenodo.org/records/XXXXXXX/files/gnn_calc_cebe_data.pt?download=1"

  - path: data/processed/gnn_exp_cebe_data.pt
    description: "Experimental CEBE molecular graphs (evaluation set)"
    size_bytes: 3396097
    sha256: c6097542f016e580478063da871550756b0c10cd91b7d0d6c6e481751d0fc8c7
    url: "https://zenodo.org/records/XXXXXXX/files/gnn_exp_cebe_data.pt?download=1"

  - path: data/processed/gnn_pes_cebe_data.pt
    description: "PES CEBE molecular graphs"
    size_bytes: 1006209
    sha256: 375735992804c5127a493f7b65da6f3c46ba3cc35c5af1e40146b12003652f1b
    url: "https://zenodo.org/records/XXXXXXX/files/gnn_pes_cebe_data.pt?download=1"

  # Raw archives (data/raw/)
  - path: data/raw/calc_cebe.tar.gz
    description: "Raw calculated CEBE XYZ files and outputs"
    size_bytes: 2897870
    sha256: 7c209279b00c592763b9cff6c03099b53957ef444d4bfd97514e72a7e0c81c10
    url: "https://zenodo.org/records/XXXXXXX/files/calc_cebe.tar.gz?download=1"

  - path: data/raw/exp_cebe.tar.gz
    description: "Raw experimental CEBE XYZ files and outputs"
    size_bytes: 955323
    sha256: 86507f379efabccb6b70959e2e9f171ed579686b1331eda357f0cae7f5dd9de8
    url: "https://zenodo.org/records/XXXXXXX/files/exp_cebe.tar.gz?download=1"

# AugerNet Data Manifest
# ======================
#
# This file records the Zenodo dataset associated with this release,
# including the DOI, per-file download URLs, file sizes, and SHA-256
# checksums for each data file.
#
# To download all data files automatically, use the `url` field for each file.
#
# To verify data integrity after downloading, run from the repo root:
#
#    md5 data/processed/*.pt data/raw/*.tar.gz
#
# and compare the output against the md5 checksums listed below.

zenodo:
  doi: "10.5281/zenodo.19688196"      # TODO: replace with actual DOI after upload
  record_id: "19688196"                 # TODO: numeric suffix of the DOI
  url: "https://doi.org/10.5281/zenodo.19688196"
  version: "1.0.0"
  title: "AugerNet: CEBE Data"
  license: "CC-BY-4.0"
  description: >
    Calculated and experimental carbon 1s core-electron binding energy (CEBE)
    datasets used to train and evaluate the AugerNet GNN models.  
    Both the raw .tar.gz and processed graph .pt dataset are included.

files:
  # Pre-processed PyG datasets (data/processed/)
  - path: data/processed/gnn_calc_cebe_data.pt
    description: "Calculated CEBE molecular graphs (primary training set)"
    size_bytes: 30019098
    md5: a7b3a3a999003d891bf2191c352a73af
    url: "https://zenodo.org/records/19688196/files/gnn_calc_cebe_data.pt?download=1"

  - path: data/processed/gnn_exp_cebe_data.pt
    description: "Experimental CEBE molecular graphs (evaluation set)"
    size_bytes: 1856499
    md5: 5b967b97268aa315e41b0ebc28c0eada
    url: "https://zenodo.org/records/19688196/files/gnn_exp_cebe_data.pt?download=1"

  # Raw archives (data/raw/)
  - path: data/raw/calc_cebe.tar.gz
    description: "Raw calculated CEBE XYZ files and outputs"
    size_bytes: 1573664
    md5: 2e8a5c5f1ab43ccd6b828513ec46a65c
    url: "https://zenodo.org/records/19688196/files/calc_cebe.tar.gz?download=1"

  - path: data/raw/exp_cebe.tar.gz
    description: "Raw experimental CEBE XYZ files and outputs"
    size_bytes: 961134
    md5: e67d539ecbf258e48cc4a745d53e19e9
    url: "https://zenodo.org/records/19688196/files/exp_cebe.tar.gz?download=1"

name: Tests

# Run on every push to main and on every pull request.
# The uv artifact cache (enable-cache: true) means that torch, torch-scatter,
# torch-sparse, and rdkit wheels are persisted between runs keyed on uv.lock.
# A cache HIT skips all compilation and reduces install time to seconds;
# a cache MISS (first run or lock-file change) does a full install.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          # Persist uv's global artifact cache (downloaded + compiled wheels)
          # across runs.  The cache key is automatically derived from uv.lock,
          # so a lock-file change triggers a fresh install while everything else
          # is a cache hit.
          enable-cache: true

      - name: Install dependencies
        # uv sync reads uv.lock and installs the full locked environment
        # (including torch, torch-scatter, torch-sparse, rdkit, etc.) into
        # a local .venv.  On a cache hit this is nearly instant.
        run: uv sync --extra test

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

name: tests

# Run on every push to main and on every pull request.
# Uses uv with caching.  CPU-only PyTorch keeps the install small and fast.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  essential-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies (CPU-only PyTorch)
        run: uv sync --extra-index-url https://download.pytorch.org/whl/cpu
        env:
          # Tell uv/pip to prefer the CPU-only torch index so it does not
          # download the ~2 GB CUDA wheels.
          UV_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu

      - name: Run essential tests
        run: uv run pytest tests/ -m essential -v --tb=short
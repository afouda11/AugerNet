name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  essential-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal dependencies
        run: pip install pytest pyyaml numpy

      - name: Install package (no deps)
        run: pip install --no-deps -e .

      - name: Run essential config tests
        run: pytest tests/test_cebe_gnn_config.py -v --tb=short
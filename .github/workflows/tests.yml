name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  UV_TORCH_BACKEND: cpu

jobs:
  essential-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run essential tests
        run: uv run pytest tests/ -m essential -v --tb=short